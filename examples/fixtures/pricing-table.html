<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Acme Analytics Pricing</title>
    <link rel="canonical" href="https://example.test/pricing">
  </head>
  <body>
    <main>
      <h1>Acme Analytics Pricing</h1>
      <section class="pricing-grid">
        <article class="plan-card">
          <h2>Starter</h2>
          <p class="price">$19/mo</p>
          <ul>
            <li>CSV export</li>
            <li>Email support</li>
          </ul>
        </article>
        <article class="plan-card">
          <h2>Growth</h2>
          <p class="price">$79/mo</p>
          <ul>
            <li>PDF export</li>
            <li>Priority support</li>
          </ul>
        </article>
        <article class="plan-card">
          <h2>Enterprise</h2>
          <p class="price">Custom pricing</p>
          <ul>
            <li>SSO</li>
            <li>Audit logs</li>
          </ul>
        </article>
      </section>
    </main>
  </body>
</html>
